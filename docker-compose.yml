version: "3.9"

services:
  longhouse-mongo:
    image: mongo:7.0
    container_name: longhouse-mongo
    restart: unless-stopped
    ports:
      - "9110:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: longhouse
      MONGO_INITDB_ROOT_PASSWORD: longhousepass
    volumes:
      - longhouse-data:/data/db

volumes:
  longhouse-data:
    name: longhouse-data

